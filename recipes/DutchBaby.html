<!DOCTYPE html>

        <meta charset="UTF-8">
        <title>Dutchbaby</title>
        <body>
            <h1>Dutchbaby</h1>
            <img src="../images/Dutchbaby.jpg" alt ="Dutchbaby">
            <h1>Ingridiants</h1>
            <ul>
                <li>1 cup of Whole Milk</li>
                <li>1 cup of Whole Wheat Flour</li>
                <li>6 eggs</li>
                <li>4 TBs of butter</li>
            </ul>
            <h1>Instructions</h1>
            <ol>
                <li>Head oven to 400*</li>
                <li>Melt Butter in Pan</li>
                <li>Mix Milk, Eggs, and Flour with a Whisk</li>
                <li>Bake at 400* for 20 minutes</li>
            </ol>
            <a href="../index.html">Home</a>
        </body>
</head>
